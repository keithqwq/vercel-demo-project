<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vercel Demo - GitHub + Vercel 部署示例</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container { text-align: center; max-width: 600px; padding: 2rem; }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }
        .badge {
            display: inline-block;
            background: rgba(0,212,255,0.15);
            border: 1px solid rgba(0,212,255,0.3);
            padding: 0.3rem 1rem;
            border-radius: 999px;
            font-size: 0.85rem;
            color: #00d4ff;
            margin-bottom: 2rem;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 1.5rem;
            margin: 1rem 0;
            backdrop-filter: blur(10px);
        }
        .card h3 { color: #00d4ff; margin-bottom: 0.5rem; }
        .card p { color: #aaa; line-height: 1.6; }
        .info { color: #666; margin-top: 2rem; font-size: 0.85rem; }
        button {
            margin-top: 1.5rem;
            padding: 0.7rem 2rem;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">GitHub + Vercel Demo</div>
        <h1>Hello Vercel</h1>
        <div class="card">
            <h3>项目结构</h3>
            <p>这是一个纯静态 HTML 示例项目，演示从本地开发 → GitHub 推送 → Vercel 自动部署的完整流程。</p>
        </div>
        <div class="card">
            <h3>部署信息</h3>
            <p id="deployInfo">加载中...</p>
        </div>
        <button onclick="showTime()">点击显示部署时间</button>
        <p class="info">由 Codex CLI 自动生成</p>
    </div>
    <script>
        function showTime() {
            const info = document.getElementById('deployInfo');
            info.textContent = '构建时间: ' + new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' }) + ' (本地时间)';
        }
        fetch('/api/time')
            .then(r => r.json())
            .then(data => {
                document.getElementById('deployInfo').textContent = 'Vercel 边缘函数返回: ' + data.time;
            })
            .catch(() => {});
    </script>
</body>
</html>
